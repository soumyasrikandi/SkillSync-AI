<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSync.AI</title>
    <link rel="icon" type="image/jpeg" href="./logo.jpg" />
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                            sidebar: '#1a102b',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #110e1b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .glass-card {
            background: rgba(46, 16, 101, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.25);
            transform: translateY(-2px);
        }
        
        button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        button:not([disabled]):hover {
            filter: brightness(1.1);
        }
        button:not([disabled]):active {
            transform: scale(0.97);
        }
        
        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #fff;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        /* Nav item transitions */
        .nav-item {
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            background-color: rgba(139, 92, 246, 0.1);
            color: #fff;
        }
        .nav-item.active {
            background-color: rgba(139, 92, 246, 0.2);
            border-right: 3px solid #a78bfa;
            color: #fff;
        }
        
        /* Mobile sidebar */
        @media (max-width: 768px) {
            .mobile-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .mobile-sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <!-- Background Accents (Only show in Auth context via React logic if desired, or let it span) -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-brand-600 rounded-full mix-blend-screen filter blur-[120px] opacity-20 pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-brand-800 rounded-full mix-blend-screen filter blur-[150px] opacity-30 pointer-events-none z-[-1]"></div>

    <div id="root" class="z-10 w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (Inline SVGs for performance without bundler) ---
        const Icons = {
            Dashboard: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>,
            Chart: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 13v-1m4 1v-3m4 3V8M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>,
            Brain: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>,
            Star: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>,
            ClipboardCheck: () => <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        };

        // --- SKILL GAP ANALYSIS COMPONENT ---
        const SkillGapAnalysis = ({ parsedData }) => {
            const [targetRole, setTargetRole] = useState('Software Engineer');
            const [analysisResult, setAnalysisResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const roles = ["Software Engineer", "Data Scientist", "Web Developer", "Mobile App Developer", "Cybersecurity Analyst"];

            const analyze = async () => {
                if (!parsedData) return;
                
                let userSkills = parsedData.skills || [];
                if (userSkills.length === 0) {
                    userSkills = ["python", "html", "css"];
                }

                setLoading(true);
                setError(null);
                try {
                    const res = await fetch('/api/auth/analyze-skills', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            role: targetRole,
                            user_skills: userSkills
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to analyze skills');
                    setAnalysisResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // Re-run analysis if role changes
            useEffect(() => {
                analyze();
            }, [targetRole, parsedData]);

            if (!parsedData) {
                return (
                    <div class="animate-fade-in flex flex-col items-center justify-center min-h-[400px]">
                        <div class="glass-card p-8 rounded-2xl max-w-md text-center">
                            <div class="inline-flex justify-center items-center w-16 h-16 rounded-full bg-brand-900/50 text-brand-400 mb-4">
                                <Icons.Upload />
                            </div>
                            <h3 class="text-xl font-bold text-white mb-2">No Resume Data</h3>
                            <p class="text-gray-400 mb-6">You need to upload and parse a resume first before we can run a gap analysis!</p>
                        </div>
                    </div>
                );
            }

            return (
                <div class="animate-fade-in space-y-6 pb-12">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 class="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight drop-shadow-md pb-1">Skill Gap Analysis</h2>
                        
                        <div class="flex items-center space-x-3 bg-brand-900/30 p-2 rounded-xl backdrop-blur-md border border-brand-800/50">
                            <span class="text-sm font-medium text-brand-300 pl-2">Target Role:</span>
                            <select 
                                value={targetRole} 
                                onChange={(e) => setTargetRole(e.target.value)}
                                class="bg-black/40 border border-brand-700/50 text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none"
                            >
                                {roles.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                    </div>

                    {error && (
                        <div class="p-4 rounded-xl text-sm transition-all bg-red-900/40 text-red-300 border border-red-500/30">
                            {error}
                        </div>
                    )}

                    {loading || !analysisResult ? (
                        <div class="h-64 flex items-center justify-center">
                            <svg class="animate-spin h-8 w-8 text-brand-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </div>
                    ) : (
                        <div>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                
                                {/* Match Overview Card */}
                                {analysisResult.match !== undefined && (
                                    <div class="glass-card rounded-2xl p-6 text-center shadow-[0_0_30px_rgba(109,40,217,0.15)] relative overflow-hidden flex flex-col justify-center">
                                        <div class="absolute inset-0 bg-brand-600/5 z-0" style={{ height: `${analysisResult.match}%`, bottom: 0, top: 'auto', transition: 'all 1s ease' }}></div>
                                        
                                        <div class="relative z-10">
                                            <h3 class="text-gray-300 font-medium mb-1">Match Confidence</h3>
                                            <div class="text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-300 to-white my-4">
                                                {analysisResult.match}%
                                            </div>
                                            
                                            <div class="w-full bg-black/40 rounded-full h-3 mb-4 overflow-hidden border border-brand-800/50">
                                                <div class={`h-3 rounded-full ${analysisResult.match >= 70 ? 'bg-green-500' : analysisResult.match >= 40 ? 'bg-yellow-500' : 'bg-red-500'} transition-all duration-1000 ease-out`} style={{width: `${analysisResult.match}%`}}></div>
                                            </div>
                                            
                                            <p class="text-sm text-gray-400">
                                                {analysisResult.match >= 80 ? "Excellent Match! You are highly competitive." : 
                                                analysisResult.match > 50 ? "Good Match! Focus on the missing skills." : 
                                                "Low Match. Significant upskilling recommended."}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* Skill Breakdown Card */}
                                {analysisResult.required && analysisResult.required.length > 0 && (
                                    <div class="glass-card rounded-2xl p-6">
                                        <div class="flex items-center justify-between mb-4">
                                            <h3 class="font-semibold text-white flex items-center">
                                                <span class="w-3 h-3 rounded-full bg-brand-500 mr-2 shadow-[0_0_10px_rgba(139,92,246,0.5)]"></span>
                                                Skill Breakdown 
                                                <span class="ml-2 text-xs font-normal text-gray-400">({analysisResult.required.length} total)</span>
                                            </h3>
                                        </div>
                                        <div class="flex flex-wrap gap-2.5 max-h-56 overflow-y-auto pr-2 pb-2" style={{ scrollbarWidth: 'thin', scrollbarColor: 'rgba(139, 92, 246, 0.3) transparent' }}>
                                            {analysisResult.required.map(skill => {
                                                const isMissing = analysisResult.missing && analysisResult.missing.includes(skill);
                                                return (
                                                    <span key={skill} class={`text-[11px] uppercase tracking-wider px-3.5 py-2 rounded-full font-bold shadow-sm break-words whitespace-normal text-center border transition-all hover:-translate-y-0.5 ${isMissing ? 'bg-red-900/30 border-red-500/40 text-red-300 shadow-[0_0_10px_rgba(239,68,68,0.15)]' : 'bg-green-900/30 border-green-500/40 text-green-300 shadow-[0_0_10px_rgba(34,197,94,0.15)]'}`}>
                                                        {skill}
                                                    </span>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                            </div>
                            
                            {/* Skill Comparison Chart */}
                            <SkillComparisonChart analysisResult={analysisResult} />
                        </div>
                    )}
                </div>
            );
        };

        // --- SKILL COMPARISON RADAR CHART (Chart.js) ---
        const SkillComparisonChart = ({ analysisResult }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current) return;
                
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                
                // Use actual required or fallback to default roles for stable visualization
                const reqSkills = analysisResult?.required || ['python', 'java', 'html', 'css', 'javascript'];
                let usrSkills = analysisResult?.user_skills || [];
                
                // Fallback skills if completely missing to avoid empty charts
                if (usrSkills.length === 0) {
                    usrSkills = ["python", "html", "css"];
                }
                
                // Labels only from ROLE_SKILLS (reqSkills list)
                // Capitalize for cleaner UI display
                const labels = reqSkills.map(s => s.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '));

                // Always 100 for required skills to maintain the outer polygon bounds
                const reqData = labels.map(() => 100);
                
                // Provide 100 if mapped, otherwise 30 for clear visualization
                const usrData = labels.map(label => {
                    const l = label.toLowerCase();
                    return usrSkills.some(u => u.toLowerCase().includes(l) || l.includes(u.toLowerCase())) ? 100 : 30;
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Your Skills',
                                data: usrData,
                                backgroundColor: 'rgba(139, 92, 246, 0.3)', // Soft purple fill
                                borderColor: 'rgba(139, 92, 246, 1)',
                                pointBackgroundColor: 'rgba(139, 92, 246, 1)',
                                pointBorderColor: '#fff',
                                borderWidth: 2,
                                fill: true,
                            },
                            {
                                label: 'Required',
                                data: reqData,
                                backgroundColor: 'transparent', // No fill like in the image
                                borderColor: 'rgba(239, 68, 68, 0.8)',
                                borderDash: [5, 5],
                                pointBackgroundColor: 'rgba(239, 68, 68, 1)',
                                pointBorderColor: '#fff',
                                borderWidth: 2,
                                fill: true,
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { display: false },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: { color: '#9ca3af', font: { size: 11, family: 'Inter' } }
                            }
                        },
                        plugins: {
                            legend: { 
                                display: true,
                                labels: { color: '#9ca3af', usePointStyle: true, boxWidth: 8 },
                                position: 'bottom'
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [analysisResult]);

            return (
                <div class="mt-8 mb-4">
                    <h3 class="text-lg font-bold text-gray-300 mb-6">Skill Comparison Radar</h3>
                    <div class="w-full h-96 flex justify-center items-center">
                        <canvas ref={chartRef}></canvas>
                    </div>
                </div>
            );
        };

        // --- RADAR CHART COMPONENT (Chart.js) ---
        const RadarChart = ({ data }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current || !data) return;
                
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                
                const labels = Object.keys(data);
                const values = Object.values(data);

                chartInstance.current = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Score %',
                            data: values,
                            backgroundColor: 'rgba(139, 92, 246, 0.4)',
                            borderColor: 'rgba(139, 92, 246, 1)',
                            pointBackgroundColor: 'rgba(139, 92, 246, 1)',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: 'rgba(139, 92, 246, 1)',
                            borderWidth: 2,
                            fill: true,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { display: false, maxTicksLimit: 5 },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: { color: '#e5e7eb', font: { size: 10, family: 'Inter' } }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [data]);

            return (
                <div class="w-full h-64 flex justify-center items-center">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        };

        // --- INTERVIEW PREDICTOR COMPONENT ---
        const InterviewPredictor = ({ parsedData }) => {
            const [targetRole, setTargetRole] = useState('Software Engineer');
            const [assessmentScore, setAssessmentScore] = useState(null);
            const [showAssessment, setShowAssessment] = useState(false);
            const [predictionResult, setPredictionResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const roles = ["Software Engineer", "Data Scientist", "Web Developer", "Mobile App Developer", "Cybersecurity Analyst"];

            const predict = async () => {
                if (!parsedData || !parsedData.skills) return;
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch('/api/auth/predict-interview', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            role: targetRole,
                            parsed_data: parsedData,
                            assessment_score: assessmentScore
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to predict outcome');
                    setPredictionResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                predict();
            }, [targetRole, parsedData, assessmentScore]);

            if (!parsedData || (!parsedData.skills && !parsedData.raw_text)) {
                return (
                    <div class="animate-fade-in flex flex-col items-center justify-center min-h-[400px]">
                        <div class="glass-card p-8 rounded-2xl max-w-md text-center">
                            <div class="inline-flex justify-center items-center w-16 h-16 rounded-full bg-brand-900/50 text-brand-400 mb-4">
                                <Icons.Upload />
                            </div>
                            <h3 class="text-xl font-bold text-white mb-2">No Resume Data</h3>
                            <p class="text-gray-400 mb-6">You need to upload and parse a resume first before predicting interview success!</p>
                        </div>
                    </div>
                );
            }

            return (
                <div class="animate-fade-in space-y-6 pb-12">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 class="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight drop-shadow-md pb-1">Interview Success Predictor</h2>
                        
                        <div class="flex items-center space-x-3 bg-brand-900/30 p-2 rounded-xl backdrop-blur-md border border-brand-800/50">
                            <span class="text-sm font-medium text-brand-300 pl-2">Target Role:</span>
                            <select 
                                value={targetRole} 
                                onChange={(e) => setTargetRole(e.target.value)}
                                class="bg-black/40 border border-brand-700/50 text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none"
                            >
                                {roles.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                    </div>

                    {error && (
                        <div class="p-4 rounded-xl text-sm transition-all bg-red-900/40 text-red-300 border border-red-500/30">
                            {error}
                        </div>
                    )}

                    {loading || !predictionResult ? (
                        <div class="h-64 flex items-center justify-center">

        // --- USER PROFILE COMPONENT ---
        const UserProfile = () => {
            const [profile, setProfile] = useState({
                name: '',

                college: '',

            const fetchProfile = async () => {
                try {
                    const res = await fetch('/api/auth/get-profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setProfile(data);
                    } else {
                        setMessage({ type: 'error', text: data.error || 'Failed to fetch profile' });
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: err.message });
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                setSaving(true);
                setMessage({ type: '', text: '' });
                try {
                    const res = await fetch('/api/auth/update-profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(profile)
                    });
                    const data = await res.json();

                        setMessage({ type: 'success', text: 'Profile saved successfully!' });

                        setMessage({ type: 'error', text: data.error || 'Failed to save profile' });

            const addArrayItem = (field) => {
                setProfile(prev => ({ ...prev, [field]: [...prev[field], ''] }));

            const updateArrayItem = (field, index, value) => {
                setProfile(prev => {
                    const newArr = [...prev[field]];
                    newArr[index] = value;
                    return { ...prev, [field]: newArr };

            const removeArrayItem = (field, index) => {

                        <button

                                        <button onClick={() => removeArrayItem('certifications', idx)} class="p-2 text-red-400 hover:bg-red-500/20 rounded-lg transition-colors">

// --- ASSESSMENT TEST COMPONENT ---
        const AssessmentTest = ({ role, parsedData, onTestComplete }) => {
            const [selectedRole, setSelectedRole] = useState(role || "Software Engineer");

            useEffect(() => {
                if (role) setSelectedRole(role);
            }, [role]);
            const [testActive, setTestActive] = useState(false);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedOptions, setSelectedOptions] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [loadingTest, setLoadingTest] = useState(false);
            
            const [questionPool, setQuestionPool] = useState([]);
            const [activeSequence, setActiveSequence] = useState([]);
            const [catStats, setCatStats] = useState({});
            const [timeLeft, setTimeLeft] = useState(30);
            const [currentDifficulty, setCurrentDifficulty] = useState("Medium");
            const [finalScore, setFinalScore] = useState(null);
            
            const MAX_QUESTIONS = 10;
            
            const roles = ["Software Engineer", "Data Scientist", "Web Developer", "Mobile App Developer", "Cybersecurity Analyst"];

            useEffect(() => {
                const saved = localStorage.getItem('career_ai_assessmentResult');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.finalScore && parsed.activeSequence) {
                            setFinalScore(parsed.finalScore);
                            setActiveSequence(parsed.activeSequence);
                            setSelectedOptions(parsed.selectedOptions || {});
                            if (parsed.selectedRole) setSelectedRole(parsed.selectedRole);
                            setShowResults(true);
                            if (onTestComplete) onTestComplete(parsed.finalScore.score);
                        }
                    } catch (e) {}
                }
            }, []);

            const handleOptionSelect = (qIndex, selectedValue) => {
                setSelectedOptions(prev => ({ ...prev, [qIndex]: selectedValue }));
            };

            useEffect(() => {
                let timer;
                if (testActive && !showResults) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [testActive, showResults, currentQIndex]);

            useEffect(() => {
                if (timeLeft === 0 && testActive && !showResults) {
                    handleNextQuestion(true); // timed out
                }
            }, [timeLeft]);

            const startTest = async () => {
                localStorage.removeItem('career_ai_assessmentResult');
                setLoadingTest(true);
                setTestActive(false);
                setShowResults(false);
                setCatStats({});
                
                try {
                    const skills = parsedData?.skills || [];
                    const res = await fetch('/api/auth/generate-assessment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ skills })
                    });
                    
                    const data = await res.json();
                    let questions = data.questions || [];
                    if (questions.length === 0) {
                        alert("Could not load questions."); 
                        setLoadingTest(false); 
                        return;
                    }
                    
                    const formattedDB = questions.map(q => ({
                        ...q,
                        correctString: q.options[q.answer],
                        options: [...q.options].sort(() => 0.5 - Math.random())
                    }));
                    
                    setQuestionPool(formattedDB);
                    
                    let firstPool = formattedDB.filter(q => q.difficulty === "Medium");
                    if (firstPool.length === 0) firstPool = formattedDB;
                    const firstQ = firstPool[Math.floor(Math.random() * firstPool.length)];
                    
                    setActiveSequence([firstQ]);
                    setCurrentDifficulty(firstQ.difficulty || "Medium");
                    
                    setTestActive(true);
                    setCurrentQIndex(0);
                    setSelectedOptions({});
                    setFinalScore(null);
                    setTimeLeft(30);
                } catch(e) { 
                    console.error(e); 
                    alert("An error occurred while generating questions.");
                } finally { 
                    setLoadingTest(false); 
                }
            };

            const submitTestComplete = async (isCorrectVal) => {
                let totalCorrect = 0;
                let totalNum = activeSequence.length;
                let newCatStats = { ...catStats };
                
                activeSequence.forEach((q, idx) => {
                    const isCorrect = (idx === currentQIndex) ? isCorrectVal : (selectedOptions[idx] === q.correctString);
                    if (isCorrect) totalCorrect++;
                    
                    if (idx === currentQIndex) {
                        const cat = q.category || "general";
                        if (!newCatStats[cat]) newCatStats[cat] = {total: 0, correct: 0};
                        newCatStats[cat].total += 1;
                        newCatStats[cat].correct += isCorrect ? 1 : 0;
                    }
                });

                try {
                    const res = await fetch('/api/auth/score-assessment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            correct_answers: totalCorrect,
                            total_questions: totalNum,
                            category_data: newCatStats
                        })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setFinalScore(data);
                        if (onTestComplete) onTestComplete(data.score);
                        
                        localStorage.setItem('career_ai_assessmentResult', JSON.stringify({
                            finalScore: data,
                            activeSequence: activeSequence,
                            selectedOptions: selectedOptions,
                            selectedRole: selectedRole
                        }));
                    }
                } catch (err) {}
                
                setCatStats(newCatStats);
                setShowResults(true);
                setTestActive(false);
            };

            const handleNextQuestion = (isTimeout = false) => {
                const currentQ = activeSequence[currentQIndex];
                const selectedOpt = selectedOptions[currentQIndex];
                const isCorrect = !isTimeout && (selectedOpt === currentQ.correctString);
                
                if (activeSequence.length >= MAX_QUESTIONS || activeSequence.length >= questionPool.length) {
                    submitTestComplete(isCorrect);
                    return;
                }
                
                setCatStats(prev => {
                    const cat = currentQ.category || "general";
                    const stats = prev[cat] || { total: 0, correct: 0 };
                    return { ...prev, [cat]: { total: stats.total + 1, correct: stats.correct + (isCorrect ? 1 : 0) } };
                });

                let nextDiff = "Medium";
                if (isCorrect) nextDiff = currentQ.difficulty === "Easy" ? "Medium" : "Hard";
                else nextDiff = currentQ.difficulty === "Hard" ? "Medium" : "Easy";

                const usedQs = activeSequence.map(q => q.q);
                let available = questionPool.filter(q => !usedQs.includes(q.q));
                let specificPool = available.filter(q => q.difficulty === nextDiff);
                if (specificPool.length === 0) specificPool = available; 
                
                if (specificPool.length === 0) {
                     submitTestComplete(isCorrect);
                     return;
                }
                
                const nextQ = specificPool[Math.floor(Math.random() * specificPool.length)];
                
                setActiveSequence(prev => [...prev, nextQ]);
                setCurrentDifficulty(nextQ.difficulty || nextDiff);
                setCurrentQIndex(prev => prev + 1);
                setTimeLeft(30);
            };

                                </p>
                                <button onClick={startTest} disabled={loadingTest} class="bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold py-3 px-10 rounded-xl shadow-[0_0_20px_rgba(139,92,246,0.4)] transition-all transform hover:scale-105 active:scale-95 disabled:opacity-50">
                                    {loadingTest ? 'Generating...' : 'Start Assessment'}
                                </button>
                            </div>
                        </div>
                    ) : showResults ? (

                                                        <span class="leading-relaxed">{wq.explanation}</span>
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>

                            <button onClick={startTest} disabled={loadingTest} class="bg-brand-900/50 hover:bg-brand-800/60 text-white font-medium py-2.5 px-6 rounded-lg border border-brand-500/30 transition-all disabled:opacity-50">
                                {loadingTest ? 'Generating...' : 'Retake Test'}
                            </button>
                        </div>
                    ) : (

                                    <span class="text-brand-300 text-sm font-semibold uppercase tracking-wider">{activeSequence[currentQIndex]?.category}</span>

                                </div>
                                <div class="flex items-center space-x-6">

                                        00:{timeLeft.toString().padStart(2, '0')}
                                    </div>
                                    <div class="hidden sm:flex flex-col w-32 ml-4">

                                                <div class="absolute top-0 right-0 bottom-0 left-0 opacity-50" style={{ backgroundImage: 'linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent)', backgroundSize: '1rem 1rem' }}></div>

                                            class={`w-full text-left px-6 py-4 rounded-xl border transition-all duration-200 flex items-center ${selectedOptions[currentQIndex] === opt ? 'bg-brand-900/40 border-brand-400 shadow-[0_0_15px_rgba(139,92,246,0.15)]' : 'bg-black/20 border-white/5 hover:border-white/10 hover:bg-black/30'}`}
                                        >
                                            <div class={`w-5 h-5 rounded-full border flex-shrink-0 mr-4 flex items-center justify-center transition-colors ${selectedOptions[currentQIndex] === opt ? 'border-brand-400 bg-brand-500/20' : 'border-gray-500'}`}>
                                                {selectedOptions[currentQIndex] === opt && <div class="w-2.5 h-2.5 bg-brand-400 rounded-full shadow-[0_0_5px_theme(colors.brand.400)]"></div>}
                                            </div>
                                            <span class={`text-[15px] ${selectedOptions[currentQIndex] === opt ? 'text-white font-medium' : 'text-gray-300'}`}>{opt}</span>
                                        </button>
                                    ))}

                                <div class="flex justify-between items-center pt-6 border-t border-white/5">

                                    </button>

                            </div>

                    )}
                </div>
            );
        };

        // --- DASHBOARD COMPONENT ---

            const [sidebarOpen, setSidebarOpen] = useState(false);

                { name: 'Profile', icon: Icons.User }
            ];

            const navigate = (page) => {

                setSidebarOpen(false); // Close mobile sidebar on navigate
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile && droppedFile.type === 'application/pdf') {
                    setFile(droppedFile);
                    setUploadError(null);
                } else {
                    setUploadError("Please upload a valid PDF file.");
                }
            };
            
            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile && selectedFile.type === 'application/pdf') {
                    setFile(selectedFile);
                    setUploadError(null);
                } else {
                    setUploadError("Please upload a valid PDF file.");
                }
            };

            const parseResume = async () => {
                if (!file) return;
                setParsing(true);
                setUploadError(null);
                
                const formData = new FormData();
                formData.append('resume', file);
                
                try {
                    const token = localStorage.getItem('career_ai_token');
                    const response = await fetch('/api/auth/upload-resume', {
                        method: 'POST',
                        // Don't set Content-Type header, let browser set it with boundary for FormData
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Parsing failed');
                    
                    setParsedData(data.data);
                } catch(err) {
                    setUploadError(err.message);
                } finally {
                    setParsing(false);
                }
            };

                setParsedData({

                    raw_text: "I lead squad discussions, oversee sprints efficiently, and present roadmaps natively."

            const renderContent = () => {

                        return (
                            <div class="space-y-16 animate-fade-in pb-16">

                                <img src="./logo.jpg" alt="SkillSync.AI Logo" class="w-full h-auto object-contain rounded-lg shadow-[0_0_15px_rgba(139,92,246,0.3)]" />
                            </div>
                            <div class="text-center">
                                <h1 class="text-lg font-bold tracking-wider text-white">SkillSync.AI</h1>
                                <p class="text-xs font-medium text-brand-400 uppercase tracking-widest mt-1">Future starts here.</p>
                            </div>
                        </div>
                        
                        <nav class="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto">
                            {navItems.map((item) => (
                                <button
                                    key={item.name}
                                    onClick={() => navigate(item.name)}
                                    class={`nav-item flex items-center w-full px-4 py-3 rounded-lg text-sm font-medium ${
                                        activePage === item.name 
                                            ? 'active font-semibold' 
                                            : 'text-brand-300'
                                    }`}
                                >
                                    <span class={`mr-3 ${activePage === item.name ? 'text-brand-400' : ''}`}>
                                        {item.icon()}
                                    </span>
                                    {item.name}
                                </button>
                            ))}
                        </nav>
                        
                        <div class="p-4 border-t border-white/5">
                            <button 
                                onClick={onLogout}
                                class="w-full flex items-center px-4 py-3 text-sm font-medium text-red-400 hover:bg-red-500/10 rounded-lg transition-colors"
                            >
                                <span class="mr-3"><Icons.Logout /></span>
                                Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main class="flex-1 overflow-y-auto w-full relative z-0">
                        {/* Background subtle elements isolated safely inside main container */}
                        <div class="absolute inset-0 z-[-1] overflow-hidden pointer-events-none">
                            <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-brand-600 rounded-full mix-blend-screen filter blur-[150px] opacity-[0.15]"></div>
                        </div>
                        
                        <div class="p-6 md:p-10 lg:p-12 h-full max-w-6xl mx-auto pt-20 md:pt-12">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        };


        // --- AUTH COMPONENT (Simplified) ---
        const AuthApp = ({ onLogin }) => {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);

            const toggleMode = (newMode) => {
                setMode(newMode);
                setError(null);
                setSuccess(null);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setSuccess(null);

                let endpoint = '';
                let payload = {};

                if (mode === 'login') {
                    endpoint = '/api/auth/login';
                    payload = { email, password };
                } else if (mode === 'signup') {
                    endpoint = '/api/auth/register';
                    payload = { name, email, password };
                }

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Something went wrong');
                    }

                    setSuccess(data.message);
                    
                    // Directly log the user in if a token is returned
                    localStorage.setItem('career_ai_email', email);
                    if(data.token) localStorage.setItem('career_ai_token', data.token);
                    if(data.name || name) localStorage.setItem('career_ai_name', data.name || name);
                    
                    setSuccess("Authentication complete! Redirecting...");
                    setTimeout(() => {
                        onLogin();
                    }, 1000);
                    
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div class="flex items-center justify-center min-h-screen">
                    <div class="glass-card rounded-2xl p-8 w-full max-w-md mx-6 backdrop-blur-xl relative z-20">
                        <div class="text-center mb-8">
                            <div class="flex justify-center mb-4">
                                <div class="p-2 w-32 rounded-xl bg-brand-900 bg-opacity-40 border border-brand-500/40 shadow-[0_0_25px_rgba(139,92,246,0.25)]">
                                    <img src="./logo.jpg" alt="SkillSync.AI Logo" class="w-full h-auto object-contain rounded-lg" />
                                </div>
                            </div>
                            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400 mt-4 drop-shadow-md pb-1">
                                SkillSync.AI
                            </h1>
                            <p class="text-[10px] font-bold text-brand-400 uppercase tracking-[0.25em] mt-1.5 mb-4">
                                Future starts here.
                            </p>
                            <p class="text-sm text-brand-300 mt-2 border-t border-brand-800/50 pt-4">
                                {mode === 'login' && 'Welcome back! Unlock your career potential.'}
                                {mode === 'signup' && 'Start your journey to success today.'}
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} class="space-y-4">
                            {mode === 'signup' && (
                                <div>
                                    <label class="block text-sm font-medium text-brand-300 mb-1">Full Name</label>
                                    <input 
                                        type="text" 
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        placeholder="John Doe"
                                        class="input-field w-full px-4 py-2.5 rounded-lg text-sm"
                                        required
                                    />
                                </div>
                            )}
                            
                            <div>
                                <label class="block text-sm font-medium text-brand-300 mb-1">Email Address</label>
                                <input 
                                    type="email" 
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="you@example.com"
                                    class="input-field w-full px-4 py-2.5 rounded-lg text-sm"
                                    required
                                />
                            </div>
                            
                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="block text-sm font-medium text-brand-300">Password</label>
                                    {mode === 'login' && (
                                        <a href="#" class="text-xs text-brand-400 hover:text-brand-300 hover:underline">Forgot password?</a>
                                    )}
                                </div>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    class="input-field w-full px-4 py-2.5 rounded-lg text-sm"
                                    required
                                />
                            </div>

                            {error && (
                                <div class="p-3 bg-red-900 bg-opacity-30 border border-red-500 rounded-lg text-red-200 text-sm">
                                    {error}
                                </div>
                            )}
                            {success && (
                                <div class="p-3 bg-green-900 bg-opacity-30 border border-green-500 rounded-lg text-green-200 text-sm">
                                    {success}
                                </div>
                            )}

                            <button 
                                type="submit" 
                                disabled={loading}
                                class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center mt-2 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                {loading && (
                                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                )}
                                {mode === 'login' && 'Sign In'}
                                {mode === 'signup' && 'Create Account'}
                            </button>
                        </form>

                        <p class="mt-8 text-center text-sm text-brand-300">
                            {mode === 'login' ? "Don't have an account?" : "Already have an account?"}
                            <button 
                                type="button" 
                                onClick={() => toggleMode(mode === 'login' ? 'signup' : 'login')}
                                class="ml-1 text-brand-400 font-semibold hover:text-brand-300 hover:underline focus:outline-none"
                            >
                                {mode === 'login' ? 'Sign up' : 'Log in'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ENTRY ---
        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(!!localStorage.getItem('career_ai_email'));

            if (isAuthenticated) {
                return <DashboardApp onLogout={() => {
                    localStorage.removeItem('career_ai_token');
                    localStorage.removeItem('career_ai_email');
                    setIsAuthenticated(false);
                }} />;
            }
            return <AuthApp onLogin={() => setIsAuthenticated(true)} />
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
